name: Quality Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm run install:all

      - name: TypeScript compilation check - Backend
        run: cd backend && npx tsc --noEmit
        continue-on-error: false

      - name: TypeScript compilation check - Frontend
        run: cd frontend && npx tsc --noEmit
        continue-on-error: false

      - name: ESLint - Backend
        run: cd backend && npm run lint
        continue-on-error: false

      - name: ESLint - Frontend
        run: cd frontend && npm run lint
        continue-on-error: false

      - name: Check code formatting - Backend
        run: cd backend && npx prettier --check "src/**/*.ts" || echo "Run npm run format"
        continue-on-error: true

      - name: Check code formatting - Frontend
        run: cd frontend && npx prettier --check "src/**/*.{ts,tsx}" || echo "Run npm run format"
        continue-on-error: true

      - name: Security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: SAST - Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/security-audit p/typescript p/nodejs
        continue-on-error: true
